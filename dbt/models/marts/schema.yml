version: 2

models:
  - name: mart_top_tracks
    description: One row per track with derived mood_score and audio_profile classification.
    columns:
      - name: track_id
        description: Spotify track ID — primary key.
        tests:
          - not_null
          - unique
      - name: duration_minutes
        description: Track duration in minutes — the primary metric for ranking.
      - name: mood_score
        description: ROUND(CASE WHEN is_explicit THEN 0.3 ELSE 0.7 END + duration_ms / 1000000.0, 4).
      - name: audio_profile
        description: Bucket label — Explicit Track / Clean Track / Short Clean.

  - name: mart_artist_summary
    description: One row per primary artist with rollup stats across their tracks in the extract.
    columns:
      - name: artist_id
        description: Spotify artist ID — primary key (sourced from primary_artist_id).
        tests:
          - not_null
          - unique
      - name: artist_name
        description: Display name of the primary artist.
      - name: track_count
        description: Number of tracks for which this artist is the primary artist.
      - name: avg_duration_minutes
        description: Mean duration (minutes) across this artist's tracks.
      - name: total_explicit_tracks
        description: Count of this artist's tracks flagged explicit (SUM of is_explicit::INT).
